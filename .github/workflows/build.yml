name: Build portable executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filename: Fetal MRI Calculator-linux
          - os: windows-latest
            filename: Fetal MRI Calculator.exe
          - os: macos-latest
            filename: Fetal MRI Calculator-macos
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller fastapi uvicorn jinja2 scipy python-multipart
      - name: Build portable executable
        run: |
          python - <<'PY'
          import os, subprocess, sys
          sep = ';' if os.name == 'nt' else ':'
          data_args = [
              f"--add-data=app/templates{sep}app/templates",
              f"--add-data=app/static{sep}app/static",
          ]
          console_flag = ['--console'] if os.name == 'nt' else []
          args = [sys.executable, '-m', 'PyInstaller', '--onefile', '--name', 'Fetal MRI Calculator', *data_args, *console_flag, 'app/main.py']
          subprocess.run(args, check=True)
          PY
      - name: Rename executable for release
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "Fetal MRI Calculator.exe" "Fetal MRI Calculator.exe"
          else
            mv "Fetal MRI Calculator" "${{ matrix.filename }}"
          fi
        shell: bash
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/${{ matrix.filename }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: List release artifacts
        run: ls -lah dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
