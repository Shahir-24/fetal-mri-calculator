name: Build portable executables

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filename: fetal-mri-calculator-linux
          - os: windows-latest
            filename: fetal-mri-calculator.exe
          - os: macos-latest
            filename: fetal-mri-calculator-macos
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller fastapi uvicorn jinja2 scipy python-multipart
      - name: Build portable executable
        shell: bash
        run: |
          python - <<'PY'
          import os, subprocess, sys
          sep = ';' if sys.platform.startswith('win') else ':'
          data_args = [
              f"--add-data=app/templates{sep}app/templates",
              f"--add-data=app/static{sep}app/static",
          ]
          console_flag = ['--console'] if sys.platform.startswith('win') else []
          name = 'fetal-mri-calculator'
          args = [sys.executable, '-m', 'PyInstaller', '--noconfirm', '--clean', '--onefile', '--name', name, *data_args, *console_flag, 'app/main.py']
          subprocess.run(args, check=True)
          PY
      - name: Rename executable for release
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="fetal-mri-calculator.exe"
          else
            src="fetal-mri-calculator"
          fi
          dest="${{ matrix.filename }}"
          if [ "$src" != "$dest" ]; then
            mv "$src" "$dest"
          fi
      - name: Package release artifact
        shell: bash
        env:
          DIST_FILENAME: ${{ matrix.filename }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          python - <<'PY'
          import os, stat, time, zipfile
          from pathlib import Path

          def add_file(zf, path, arcname):
              st = path.stat()
              zi = zipfile.ZipInfo(arcname)
              zi.date_time = time.localtime(st.st_mtime)[:6]
              zi.external_attr = (st.st_mode & 0xFFFF) << 16
              zi.compress_type = zipfile.ZIP_DEFLATED
              with path.open('rb') as fp:
                  zf.writestr(zi, fp.read())

          dist = Path('dist')
          name = os.environ['DIST_FILENAME']
          platform = os.environ['MATRIX_OS']
          exe_path = dist / name

          if platform == 'macos-latest':
              wrapper = dist / f'{name}.command'
              wrapper.write_text('#!/bin/bash\ncd "$(dirname "$0")"\n./' + name + '\n', encoding='utf-8')
              wrapper.chmod(wrapper.stat().st_mode | stat.S_IEXEC)
              zip_name = dist / 'fetal-mri-calculator-macos.zip'
              with zipfile.ZipFile(zip_name, 'w') as z:
                  add_file(z, exe_path, exe_path.name)
                  add_file(z, wrapper, wrapper.name)
          elif platform == 'ubuntu-latest':
              zip_name = dist / 'fetal-mri-calculator-linux.zip'
              with zipfile.ZipFile(zip_name, 'w') as z:
                  add_file(z, exe_path, exe_path.name)
          else:
              zip_name = dist / 'fetal-mri-calculator-windows.zip'
              with zipfile.ZipFile(zip_name, 'w') as z:
                  add_file(z, exe_path, exe_path.name)

          print('Packaged', zip_name)
          PY
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: List release artifacts
        run: |
          find dist -type f | sort
      - id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }} artifacts"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload release assets
        shell: bash
        run: |
          cd dist
          release_id="${{ steps.create_release.outputs.id }}"
          for file in $(find . -type f | sort); do
            file_path="$file"
            file_name=$(basename "$file_path")
            echo "Uploading $file_path as $file_name"
            curl -S --fail -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file_path" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=${file_name}"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
