name: Build portable executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filename: fetal-mri-calculator-linux
          - os: windows-latest
            filename: fetal-mri-calculator.exe
          - os: macos-latest
            filename: fetal-mri-calculator-macos
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller fastapi uvicorn jinja2 scipy python-multipart
      - name: Build portable executable
        shell: bash
        run: |
          python - <<'PY'
          import os, subprocess, sys
          sep = ';' if sys.platform.startswith('win') else ':'
          data_args = [
              f"--add-data=app/templates{sep}app/templates",
              f"--add-data=app/static{sep}app/static",
          ]
          console_flag = ['--console'] if sys.platform.startswith('win') else []
          name = 'fetal-mri-calculator'
          args = [sys.executable, '-m', 'PyInstaller', '--noconfirm', '--clean', '--onefile', '--name', name, *data_args, *console_flag, 'app/main.py']
          subprocess.run(args, check=True)
          PY
      - name: Rename executable for release
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="fetal-mri-calculator.exe"
          else
            src="fetal-mri-calculator"
          fi
          dest="${{ matrix.filename }}"
          if [ "$src" != "$dest" ]; then
            mv "$src" "$dest"
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/${{ matrix.filename }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: List release artifacts
        run: |
          find dist -type f | sort
      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
