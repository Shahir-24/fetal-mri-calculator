name: Build portable executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Fetal MRI Calculator
            asset_name: fetal-mri-calculator-linux
          - os: windows-latest
            artifact_name: Fetal MRI Calculator.exe
            asset_name: Fetal MRI Calculator.exe
          - os: macos-latest
            artifact_name: Fetal MRI Calculator
            asset_name: Fetal MRI Calculator-macos
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller fastapi uvicorn jinja2 scipy python-multipart
      - name: Build portable executable
        run: |
          python - <<'PY'
          import os, subprocess, sys
          sep = ';' if os.name == 'nt' else ':'
          data_args = [
              f"--add-data=app/templates{sep}app/templates",
              f"--add-data=app/static{sep}app/static",
          ]
          console_flag = ['--console'] if os.name == 'nt' else []
          args = [sys.executable, '-m', 'PyInstaller', '--onefile', '--name', 'Fetal MRI Calculator', *data_args, *console_flag, 'app/main.py']
          subprocess.run(args, check=True)
          PY
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.artifact_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
